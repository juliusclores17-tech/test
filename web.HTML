<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My bb :pp</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    overflow-x: hidden;
    text-align: center;
    color: white;
}

.container {
    padding: 40px;
    position: relative;
}

h1 {
    font-size: 3em;
}

/* Card */
.card {
    background: rgba(255,255,255,0.2);
    padding: 20px;
    border-radius: 15px;
    margin: 20px auto;
    max-width: 400px;
}

/* Buttons */
button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #ff6f91;
    color: white;
    cursor: pointer;
    margin: 5px;
}

/* 💖 Floating Hearts */
.heart {
    position: fixed;
    animation: floatUp linear infinite;
    pointer-events: none;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* 🎉 Confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
}

/* 📸 Slideshow */
.slideshow {
    position: relative;
    max-width: 400px;
    margin: 20px auto;
}

.slide {
    width: 100%;
    border-radius: 15px;
    display: none;
}

.slide.active {
    display: block;
}

/* 🎮 Game */
#gameArea {
    height: 250px;
    background: rgba(255,255,255,0.15);
    border-radius: 15px;
    position: relative;
    overflow: hidden;
    margin: 20px auto;
    max-width: 400px;
}

.fallingHeart {
    position: absolute;
    font-size: 25px;
    cursor: pointer;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="makeyoumine.mp3">
</audio>

<div class="container">

<h1>Hi bb!!! ❤️</h1>

<button onclick="toggleMusic()">🎵 Play / Pause</button>

<!-- 💌 TYPEWRITER -->
<div class="card">
    <p id="typing"></p>
</div>

<!-- 💖 Reasons -->
<div class="card">
    <h2>💖 Reasons I Love You</h2>
    <p>You make me smile every day</p>
    <p>You're my safe place</p>
    <p>You make life better</p>
</div>

<button onclick="startExperience()">Click Me 💌</button>

<!-- 📸 SLIDESHOW -->
<h2>Bebe ko</h2>

<div class="slideshow">
    <img class="slide active" src="bbnyx.jpg" onclick="setCaption(' pakiss nga❤️')">
    <img class="slide" src="gandaganda.jpg" onclick="setCaption('You look so beautiful here 😍')">
    <img class="slide" src="nyx.jpg" onclick="setCaption('Gandaaaa💕')">
</div>

<p id="caption"></p>

<button onclick="changeSlide(-1)">Prev</button>
<button onclick="changeSlide(1)">Next</button>

<!-- 🎮 MINI GAME -->
<h2>Catch My Love ❤️</h2>
<div id="gameArea"></div>
<p>Score: <span id="score">0</span></p>

<!-- 😏 YES / NO -->
<h2>Will you stay with me? ❤️</h2>

<div style="position: relative; height: 150px;">
    <button onclick="yesAnswer()">YES 💖</button>
    <button id="noBtn" onmouseover="moveNo()">NO 😜</button>
</div>

</div>

<script>
const music = document.getElementById("bgMusic");

/* 🎵 Music */
function toggleMusic(){
    if(music.paused) music.play();
    else music.pause();
}

/* 💌 Typewriter */
const text = "I made this because you mean so much to me. Every moment with you is my favorite ❤️";
let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}
typeWriter();

/* 💖 Floating hearts */
setInterval(()=>{
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
},300);

/* 🎉 Confetti */
function celebrate(){
    for(let i=0;i<100;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left="50%";
        c.style.top="50%";
        c.style.background="hsl("+Math.random()*360+",100%,70%)";
        document.body.appendChild(c);

        let angle=Math.random()*2*Math.PI;
        let dist=Math.random()*300;

        let x=Math.cos(angle)*dist;
        let y=Math.sin(angle)*dist;

        c.animate([{transform:"translate(0,0)"},{transform:`translate(${x}px,${y}px)`}],
        {duration:1000});

        setTimeout(()=>c.remove(),1000);
    }
}

function startExperience(){
    music.play().catch(()=>{});
    alert("I love you so much ❤️");
    celebrate();
}

/* 😏 YES */
function yesAnswer(){
    alert("Yay!! PALDOOOO!!!! ❤️🥰");
    celebrate();
}

/* 😜 NO (bounded now) */
function moveNo(){
    const btn=document.getElementById("noBtn");
    const container=document.querySelector(".container");

    const maxX=container.clientWidth-100;
    const maxY=150;

    btn.style.position="absolute";
    btn.style.left=Math.random()*maxX+"px";
    btn.style.top=Math.random()*maxY+"px";
}

/* 📸 slideshow */
let currentSlide=0;
const slides=document.getElementsByClassName("slide");

function changeSlide(n){
    currentSlide+=n;
    if(currentSlide>=slides.length) currentSlide=0;
    if(currentSlide<0) currentSlide=slides.length-1;

    for(let s of slides) s.classList.remove("active");
    slides[currentSlide].classList.add("active");
}

/* caption */
function setCaption(text){
    document.getElementById("caption").innerText=text;
}

/* 🎮 game */
let score=0;

function spawnHeart(){
    let heart=document.createElement("div");
    heart.className="fallingHeart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*90+"%";
    heart.style.top="0px";

    let game=document.getElementById("gameArea");
    game.appendChild(heart);

    let fall=setInterval(()=>{
        heart.style.top=(heart.offsetTop+5)+"px";
        if(heart.offsetTop>220){
            heart.remove();
            clearInterval(fall);
        }
    },50);

    heart.onclick=()=>{
        score++;
        document.getElementById("score").innerText=score;
        heart.remove();
        clearInterval(fall);
    };
}

setInterval(spawnHeart,800);
</script>

</body>
</html>
